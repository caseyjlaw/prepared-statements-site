<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prepared statements</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>Prepared statements</h1>
        <p class="lead">
          Pick a statement, add your email, then send the composed message from your own mail app.
        </p>
      </header>

      <main class="card">
        <div class="field">
          <div
            id="statement-list"
            class="statement-list"
            aria-label="Available statements"
            hidden
          ></div>
          <label for="statement">Statement</label>
          <select id="statement" aria-describedby="preview-intro"></select>
          <p class="preview-label">Preview (first line)</p>
          <p id="intro" class="preview" aria-live="polite"></p>
        </div>

        <div class="field">
          <label for="email">Your email</label>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            inputmode="email"
            placeholder="you@example.com"
            required
          />
        </div>

        <div class="actions">
          <button type="button" id="compose">Open in email app</button>
          <span class="hint">
            Uses your device’s mail program; nothing is sent from this website.
          </span>
        </div>

        <p id="status" role="status"></p>
      </main>

      <footer>
        Content is defined in <code>statements.md</code>. Recipient address is set in
        <code>config.js</code>.
      </footer>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
