<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Complete streets advocacy</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="wrap">
      <p id="advocacy-headline" class="advocacy-hero"></p>

      <main class="card">
        <div class="field">
          <span id="template-picker-label" class="field-label-static">Templates</span>
          <div
            id="template-picker"
            class="template-picker"
            role="group"
            aria-labelledby="template-picker-label"
            hidden
          ></div>
        </div>

        <div class="field">
          <label for="email-subject">Subject line</label>
          <input
            id="email-subject"
            name="email-subject"
            type="text"
            autocomplete="off"
            placeholder="Choose a template or enter a subject."
          />
          <p class="field-hint">Filled from the template title when you click a box; you can change it anytime.</p>
        </div>

        <div class="field">
          <label for="message">Your message</label>
          <textarea
            id="message"
            name="message"
            rows="10"
            spellcheck="true"
            placeholder="Pick a template or write your own message."
          ></textarea>
        </div>

        <div class="field">
          <label for="sender-email">Contact email</label>
          <select id="sender-email" name="sender-email" aria-describedby="sender-email-hint"></select>
          <p id="sender-email-hint" class="field-hint">
            Preset address included with your message so the recipient can reply.
          </p>
        </div>

        <div class="actions">
          <button type="button" id="compose" class="btn-send">
            <span class="btn-send-main">Send email</span>
            <span class="btn-send-note">(will send email via your client)</span>
          </button>
        </div>

        <p id="status" role="status"></p>
      </main>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
